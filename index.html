<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="calculator">
    <input type="text" id="display"  >

    <div class="buttons">
      <button class="btn clear" data-value="clear" onclick="clearing()">C</button>
      <button class="btn" data-value="/" onclick="division()">÷</button>
      <button class="btn" data-value="*"onclick='multiplying()'>×</button>
      <button class="btn" data-value="backspace" onclick="backremoving()">⌫</button>

      <button class="btn" data-value="7" onclick="seven()">7</button>
      <button class="btn" data-value="8" onclick="eight()">8</button>
      <button class="btn" data-value="9" onclick="nine()">9</button>
      <button class="btn" data-value="-" onclick="subtracting()">−</button>

      <button class="btn" data-value="4"onclick='four()'>4</button>
      <button class="btn" data-value="5" onclick="five()">5</button>
      <button class="btn" data-value="6" onclick="six()">6</button>
      <button class="btn" data-value="+" onclick="adding()">+</button>

      <button class="btn" data-value="1" onclick="one()">1</button>
      <button class="btn" data-value="2" onclick="two()">2</button>
      <button class="btn" data-value="3" onclick="three()">3</button>
      <button class="btn equals" data-value="=" onclick="operation()">=</button>

      <button class="btn zero" data-value="0" onclick="zero()">0</button>
      <button class="btn" data-value="." onclick="point()">.</button>
    </div>
  </div>



    <script src="app.js"></script>
</body>
</html>
